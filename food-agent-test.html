<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodHub · Food Agent — Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0b0f;
      --bg2:      #111318;
      --bg3:      #1a1d26;
      --border:   rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.14);
      --text:     #f0f1f5;
      --muted:    #6b7280;
      --accent:   #f97316;
      --accent2:  #fb923c;
      --green:    #22c55e;
      --red:      #ef4444;
      --glass:    rgba(255,255,255,0.04);
      --r:        16px;
      --rsm:      10px;
      --shadow:   0 20px 60px rgba(0,0,0,0.5);
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ─── SELECTOR ─── */
    #selector {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 2rem;
      background: radial-gradient(ellipse 80% 55% at 50% -5%, rgba(249,115,22,.14) 0%, transparent 65%),
                  radial-gradient(ellipse 50% 40% at 85% 110%, rgba(251,146,60,.08) 0%, transparent 55%),
                  var(--bg);
      transition: opacity .35s, transform .35s;
    }
    #selector.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

    .s-logo {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 6px rgba(249,115,22,.4)); }
      50%      { filter: drop-shadow(0 0 18px rgba(249,115,22,.8)); }
    }

    .s-card {
      width: 100%; max-width: 460px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: calc(var(--r) * 1.5); padding: 2.25rem;
      backdrop-filter: blur(20px); box-shadow: var(--shadow);
    }
    .s-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: .25rem; }
    .s-card > p { color: var(--muted); font-size: .88rem; margin-bottom: 1.75rem; }

    .cap { font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .55rem; display: block; }

    .preset { display: flex; align-items: center; gap: .7rem; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rsm); padding: .75rem .9rem; cursor: pointer; color: var(--text); font-family: inherit; font-size: .88rem; text-align: left; transition: background .2s, border-color .2s, transform .15s; width: 100%; }
    .preset:hover { background: var(--glass); border-color: var(--border-h); transform: translateX(3px); }
    .p-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .p-info b { display: block; font-weight: 600; font-size: .88rem; }
    .p-info small { color: var(--muted); font-size: .75rem; }
    .p-badge { margin-left: auto; font-size: .68rem; font-weight: 600; background: rgba(34,197,94,.12); color: var(--green); padding: .18rem .5rem; border-radius: 99px; border: 1px solid rgba(34,197,94,.2); }

    .s-sep { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--muted); font-size: .75rem; }
    .s-sep::before, .s-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .s-row { display: flex; gap: .55rem; }
    .s-row input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rsm); padding: .7rem 1rem; color: var(--text); font-size: .88rem; font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s; min-width: 0; }
    .s-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
    .s-row button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: var(--rsm); padding: .7rem 1.1rem; font-weight: 600; font-size: .88rem; cursor: pointer; white-space: nowrap; font-family: inherit; transition: opacity .2s, transform .15s; }
    .s-row button:hover { opacity: .9; transform: translateY(-1px); }

    .s-err { margin-top: .9rem; font-size: .8rem; color: var(--red); display: none; }
    .s-err.on { display: block; }

    /* ─── APP SHELL ─── */
    #app { display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: opacity .35s .1s; }
    #app.on { opacity: 1; }

    /* ─── HEADER ─── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    .app-header-left { display: flex; align-items: center; gap: .75rem; }
    .app-logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: .85rem; }
    .app-biz-name { font-weight: 700; font-size: .95rem; }
    .app-biz-status { display: flex; align-items: center; gap: .35rem; font-size: .75rem; color: var(--muted); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-dot 2s ease-in-out infinite; }
    .sdot.off { background: var(--muted); animation: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.3} }

    .header-actions { display: flex; gap: .5rem; }
    .hbtn { background: none; border: 1px solid var(--border); border-radius: var(--rsm); padding: .4rem .85rem; color: var(--muted); font-size: .78rem; cursor: pointer; font-family: inherit; transition: all .2s; }
    .hbtn:hover { border-color: var(--border-h); color: var(--text); }
    .dev-tag { font-size: .68rem; font-weight: 600; letter-spacing: .06em; background: rgba(249,115,22,.1); color: var(--accent); border: 1px solid rgba(249,115,22,.2); border-radius: 99px; padding: .22rem .65rem; }

    /* ─── MESSAGES ─── */
    #messages {
      flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: .7rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg {
      max-width: 68%; border-radius: var(--r);
      padding: .7rem 1rem; font-size: .88rem; line-height: 1.58;
      animation: min .22s ease-out;
    }
    @keyframes min { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }

    .msg.agent { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user  { align-self: flex-end; background: linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; border-bottom-right-radius: 4px; }
    .msg.sys   { align-self: center; background: rgba(107,114,128,.1); color: var(--muted); font-size: .76rem; border-radius: 99px; padding: .35rem .9rem; max-width: 90%; }
    .msg.typing { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .dots { display: flex; gap: 4px; align-items: center; padding: .1rem 0; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: dp 1.2s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay:.2s } .dots span:nth-child(3) { animation-delay:.4s }
    @keyframes dp { 0%,80%,100%{transform:scale(1);opacity:.5} 40%{transform:scale(1.3);opacity:1} }

    /* ─── INLINE CONFIRM CARD ─── */
    .confirm-card {
      align-self: flex-start;
      width: min(400px, 90vw);
      background: var(--bg3); border: 1px solid var(--border-h);
      border-radius: var(--r); border-bottom-left-radius: 4px;
      overflow: hidden;
      animation: min .25s ease-out;
    }
    .cc-header {
      background: rgba(249,115,22,.07); border-bottom: 1px solid var(--border);
      padding: .85rem 1rem; display: flex; align-items: center; gap: .6rem;
    }
    .cc-header .cc-icon { font-size: 1.1rem; }
    .cc-header b { font-size: .88rem; font-weight: 700; }
    .cc-header small { display: block; color: var(--muted); font-size: .74rem; }
    .cc-items { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .35rem; border-bottom: 1px solid var(--border); }
    .cc-item { display: flex; justify-content: space-between; font-size: .83rem; }
    .cc-item span { color: var(--muted); }
    .cc-item strong { color: var(--accent); }
    .cc-total { display: flex; justify-content: space-between; font-weight: 700; font-size: .9rem; padding-top: .4rem; border-top: 1px solid var(--border); margin-top: .2rem; }
    .cc-form { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .65rem; }
    .cc-form label { font-size: .74rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: .25rem; }
    .cc-form input, .cc-form textarea {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: .55rem .8rem;
      color: var(--text); font-size: .85rem; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .cc-form input:focus, .cc-form textarea:focus { border-color: var(--accent); }
    .cc-form textarea { resize: none; rows: 2; }
    .cc-actions { display: flex; gap: .5rem; padding: 0 1rem 1rem; }
    .cc-submit {
      flex: 1; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: var(--rsm);
      padding: .65rem; font-weight: 700; font-size: .85rem;
      cursor: pointer; font-family: inherit; transition: opacity .2s;
    }
    .cc-submit:hover { opacity: .9; }
    .cc-submit:disabled { opacity: .4; cursor: default; }
    .cc-cancel {
      background: none; border: 1px solid var(--border); border-radius: var(--rsm);
      padding: .65rem .9rem; color: var(--muted); font-size: .82rem;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .cc-cancel:hover { border-color: var(--border-h); color: var(--text); }

    /* ─── SUCCESS CARD (inline en el chat) ─── */
    .success-card {
      align-self: flex-start;
      width: min(400px, 90vw);
      background: var(--bg3); border: 1px solid rgba(34,197,94,.25);
      border-radius: var(--r); border-bottom-left-radius: 4px;
      overflow: hidden;
      animation: min .3s ease-out;
      box-shadow: 0 0 40px rgba(34,197,94,.06);
    }
    .sc-top {
      background: rgba(34,197,94,.07); border-bottom: 1px solid rgba(34,197,94,.15);
      padding: 1.1rem 1rem; text-align: center;
    }
    .sc-emoji { font-size: 1.8rem; display: block; margin-bottom: .4rem; animation: pop .5s .1s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    .sc-eyebrow { font-size: .68rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--green); }
    .sc-title { font-size: 1rem; font-weight: 700; margin-top: .2rem; }
    .sc-num { display: inline-block; background: var(--bg2); border: 1px solid var(--border); border-radius: 99px; padding: .3rem 1rem; font-size: .8rem; font-weight: 700; color: var(--accent); margin-top: .6rem; }
    .sc-items { padding: .85rem 1rem; display: flex; flex-direction: column; gap: .3rem; }
    .sc-item { display: flex; justify-content: space-between; font-size: .82rem; }
    .sc-item span { color: var(--muted); }
    .sc-total { display: flex; justify-content: space-between; font-weight: 700; font-size: .9rem; padding-top: .5rem; border-top: 1px solid var(--border); margin-top: .2rem; }
    .sc-footer { padding: .75rem 1rem 1rem; }
    .sc-new-btn {
      width: 100%; background: none; border: 1px solid var(--border);
      border-radius: var(--rsm); padding: .6rem;
      color: var(--muted); font-size: .82rem; font-family: inherit;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .sc-new-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── CART BAR ─── */
    #cart-bar {
      display: none; flex-shrink: 0;
      padding: .75rem 1.5rem; border-top: 1px solid var(--border);
      background: var(--bg2);
      align-items: center; gap: 1rem;
    }
    #cart-bar.on { display: flex; animation: min .2s ease-out; }
    .cb-summary { flex: 1; }
    .cb-count { font-size: .75rem; color: var(--muted); }
    .cb-total { font-weight: 700; font-size: .95rem; }
    .cb-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: var(--rsm);
      padding: .6rem 1.2rem; font-weight: 700; font-size: .85rem;
      cursor: pointer; font-family: inherit; transition: opacity .2s, transform .15s;
      white-space: nowrap;
    }
    .cb-btn:hover { opacity: .9; transform: translateY(-1px); }
    .cb-clear { background: none; border: none; color: var(--muted); font-size: .78rem; cursor: pointer; font-family: inherit; transition: color .2s; white-space: nowrap; }
    .cb-clear:hover { color: var(--red); }

    /* ─── COMPOSER ─── */
    .composer { padding: .9rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: .75rem; background: var(--bg2); flex-shrink: 0; }
    .composer input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 99px; padding: .7rem 1.2rem; color: var(--text); font-size: .88rem; font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s; }
    .composer input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
    .composer button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 99px; padding: .7rem 1.4rem; font-weight: 600; cursor: pointer; font-family: inherit; font-size: .88rem; transition: opacity .2s, transform .15s; }
    .composer button:hover { opacity: .9; transform: translateY(-1px); }
    .composer button:disabled { opacity: .35; transform: none; cursor: default; }

    /* ─── LOADING ─── */
    #loader { position: fixed; inset: 0; background: rgba(10,11,15,.85); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); transition: opacity .3s; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spin { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="loader" class="hidden"><div class="spin"></div></div>

<!-- ─── SELECTOR ─── -->
<div id="selector">
  <div class="s-logo">✦</div>
  <div class="s-card">
    <h1>Food Agent · Tester</h1>
    <p>Selecciona un negocio para iniciar la conversación.</p>

    <span class="cap">Negocios disponibles</span>
    <div id="presets" style="display:flex;flex-direction:column;gap:.45rem">
      <button class="preset" data-slug="pizza-nostra">
        <div class="p-icon" style="background:rgba(239,68,68,.12)">🍕</div>
        <div class="p-info"><b>Pizza Nostra</b><small>pizza-nostra</small></div>
        <span class="p-badge">Online</span>
      </button>
    </div>

    <div class="s-sep">o ingresa un slug</div>
    <div class="s-row">
      <input id="slug-in" type="text" placeholder="mi-restaurante" spellcheck="false" autocomplete="off" />
      <button id="slug-go">Probar →</button>
    </div>
    <p class="s-err" id="s-err"></p>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="app">
  <header class="app-header">
    <div class="app-header-left">
      <div class="app-logo">✦</div>
      <div>
        <div class="app-biz-name" id="biz-name">—</div>
        <div class="app-biz-status">
          <span class="sdot" id="sdot"></span>
          <span id="biz-status">Verificando…</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <span class="dev-tag">DEV</span>
      <button class="hbtn" id="back-btn">← Cambiar negocio</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="cart-bar">
    <div class="cb-summary">
      <div class="cb-count" id="cb-count">0 productos</div>
      <div class="cb-total" id="cb-total">$0</div>
    </div>
    <button class="cb-clear" id="cb-clear">Vaciar</button>
    <button class="cb-btn" id="cb-confirm">Confirmar pedido →</button>
  </div>

  <form class="composer" id="composer">
    <input id="msg-in" autocomplete="off" placeholder="Ej.: Quiero 2 pizzas napolitanas…" required />
    <button id="send-btn" type="submit">Enviar</button>
  </form>
</div>

<script>
  const URL_FN = 'https://fgvhbniauzjvzeuespmf.supabase.co/functions/v1/food-agent';
  // collect: máquina de estados para recoger datos por chat
  const st = { messages: [], cart: [], org: null, slug: null };
  const collect = { active: false, step: null, data: {} };
  // steps: 'name' → 'phone' → 'notes'
  const $ = s => document.querySelector(s);
  const esc = v => String(v).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[c]);

  function money(n) {
    return new Intl.NumberFormat('es-CL', { style:'currency', currency: st.org?.currency||'CLP', maximumFractionDigits:0 }).format(n||0);
  }

  async function api(body) {
    const r = await fetch(URL_FN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ organization_slug: st.slug, ...body }) });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.error || 'Error de conexión.');
    return d;
  }

  // ── Mensajes ──────────────────────────────────────────────────────────────
  function msg(text, role='agent') {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    if (role==='typing') {
      el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    } else {
      el.textContent = text;
    }
    $('#messages').append(el);
    $('#messages').scrollTop = $('#messages').scrollHeight;
    return el;
  }

  // ── Cart bar ──────────────────────────────────────────────────────────────
  function renderCartBar() {
    const bar = $('#cart-bar');
    if (!st.cart.length || collect.active) { bar.classList.remove('on'); return; }
    bar.classList.add('on');
    const count = st.cart.reduce((t,i)=>t+i.quantity, 0);
    const total = st.cart.reduce((s,i)=>s+i.unit_price*i.quantity, 0);
    $('#cb-count').textContent = `${count} producto${count!==1?'s':''}`;
    $('#cb-total').textContent = money(total);
  }

  // ── Collect flow (conversacional) ─────────────────────────────────────────
  const PLACEHOLDERS = {
    name:  'Escribe tu nombre…',
    phone: 'Escribe tu teléfono…',
    notes: 'Escribe tus notas (o "ninguna")…',
    idle:  'Ej.: Quiero 2 pizzas napolitanas…'
  };

  function setPlaceholder(step) {
    $('#msg-in').placeholder = PLACEHOLDERS[step] || PLACEHOLDERS.idle;
  }

  function startCollect() {
    if (collect.active) return; // ya en curso
    collect.active = true;
    collect.step = 'name';
    collect.data = {};
    renderCartBar(); // ocultar cart bar durante el flujo
    setPlaceholder('name');
    msg(`¡Perfecto! Para confirmar tu pedido necesito un par de datos 🧾.\n\n¿A nombre de quién va el pedido?`);
    $('#msg-in').focus();
  }

  function cancelCollect() {
    collect.active = false;
    collect.step = null;
    collect.data = {};
    setPlaceholder('idle');
    renderCartBar();
    msg('Reserva cancelada. Tu carrito sigue guardado, puedes seguir pidiendo.', 'sys');
  }

  async function handleCollectStep(text) {
    const step = collect.step;

    if (text.toLowerCase() === 'cancelar') {
      cancelCollect();
      return;
    }

    if (step === 'name') {
      collect.data.name = text;
      collect.step = 'phone';
      setPlaceholder('phone');
      msg(`Gracias, ${text} 👋 ¿Y tu número de teléfono de contacto?`);

    } else if (step === 'phone') {
      collect.data.phone = text;
      collect.step = 'notes';
      setPlaceholder('notes');
      msg('¿Alguna nota especial para el local? (alérgenos, instrucciones de entrega, etc.) Escribe "ninguna" si no tienes.');

    } else if (step === 'notes') {
      const notes = /^(ninguna?|no|sin notas?|nada)$/i.test(text.trim()) ? '' : text;
      collect.data.notes = notes;

      // Llamar a confirm
      collect.step = null;
      setPlaceholder('idle');
      const cartSnapshot = [...st.cart];
      const total = cartSnapshot.reduce((s,i)=>s+i.unit_price*i.quantity,0);
      const typing = msg('', 'typing');
      $('#send-btn').disabled = true;

      try {
        const data = await api({
          action: 'confirm',
          channel: 'web',
          cart: cartSnapshot,
          customer: { name: collect.data.name, phone: collect.data.phone, notes }
        });
        typing.remove();
        collect.active = false;
        collect.data = {};
        st.cart = [];
        st.messages = [];
        renderCartBar();
        showSuccessCard(data, cartSnapshot);
      } catch(err) {
        typing.remove();
        collect.active = false;
        collect.data = {};
        renderCartBar();
        msg('⚠ ' + err.message + ' — tu carrito sigue guardado.', 'sys');
      } finally {
        $('#send-btn').disabled = false;
        $('#msg-in').focus();
      }
    }
  }

  // ── Success card inline ───────────────────────────────────────────────────
  function showSuccessCard(data, cartSnapshot) {
    const total = cartSnapshot.reduce((s,i)=>s+i.unit_price*i.quantity, 0);
    const itemsHtml = cartSnapshot.map(i =>
      `<div class="sc-item"><span>${i.quantity} × ${esc(i.name)}</span><span>${money(i.unit_price*i.quantity)}</span></div>`
    ).join('');

    const card = document.createElement('div');
    card.className = 'success-card';
    card.innerHTML = `
      <div class="sc-top">
        <span class="sc-emoji">✅</span>
        <div class="sc-eyebrow">Pedido confirmado</div>
        <div class="sc-title">¡Todo listo!</div>
        <div class="sc-num">${data.order_number}</div>
      </div>
      <div class="sc-items">
        ${itemsHtml}
        <div class="sc-total"><span>Total</span><strong>${money(data.total ?? total)}</strong></div>
      </div>
      <div class="sc-footer">
        <button class="sc-new-btn" id="sc-new">Hacer otro pedido</button>
      </div>
    `;
    $('#messages').append(card);
    $('#messages').scrollTop = $('#messages').scrollHeight;
    card.querySelector('#sc-new').addEventListener('click', () => {
      card.remove();
      $('#messages').innerHTML = '';
      msg('¡Hola de nuevo! ¿Qué más te gustaría pedir?');
    });
  }

  // ── Init negocio ──────────────────────────────────────────────────────────
  async function initBiz(slug) {
    st.slug = slug; st.messages = []; st.cart = [];
    collect.active = false; collect.step = null; collect.data = {};
    $('#messages').innerHTML = '';
    renderCartBar();
    setPlaceholder('idle');
    $('#loader').classList.remove('hidden');
    try {
      const d = await api({ action: 'welcome' });
      st.org = d.organization;
      $('#biz-name').textContent = d.organization.name;
      $('#biz-status').textContent = d.organization.online_enabled ? 'Pedidos abiertos' : 'Pedidos cerrados';
      $('#sdot').className = 'sdot' + (d.organization.online_enabled ? '' : ' off');
      $('#selector').classList.add('hidden');
      $('#app').classList.add('on');
      msg(d.message);
      if (!d.organization.online_enabled) msg('Esta sucursal no recibe pedidos online actualmente.', 'sys');
      $('#msg-in').focus();
    } catch(err) {
      const el = $('#s-err');
      el.textContent = '⚠ ' + err.message;
      el.classList.add('on');
      st.slug = null;
    } finally {
      $('#loader').classList.add('hidden');
    }
  }

  // ── Selector ──────────────────────────────────────────────────────────────
  document.querySelectorAll('.preset').forEach(b =>
    b.addEventListener('click', () => { $('#s-err').classList.remove('on'); initBiz(b.dataset.slug); })
  );
  $('#slug-go').addEventListener('click', () => {
    const s = $('#slug-in').value.trim().toLowerCase().replace(/\s+/g,'-');
    if (!s) return;
    $('#s-err').classList.remove('on'); initBiz(s);
  });
  $('#slug-in').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();$('#slug-go').click();} });

  // ── Header ────────────────────────────────────────────────────────────────
  $('#back-btn').addEventListener('click', () => {
    $('#app').classList.remove('on');
    $('#selector').classList.remove('hidden');
    $('#s-err').classList.remove('on');
    collect.active = false; collect.step = null; collect.data = {};
  });

  // ── Cart bar ──────────────────────────────────────────────────────────────
  $('#cb-confirm').addEventListener('click', startCollect);
  $('#cb-clear').addEventListener('click', () => {
    st.cart = []; renderCartBar();
    msg('Carrito vaciado. ¿Qué te gustaría pedir?', 'sys');
  });

  // ── Chat / composer ───────────────────────────────────────────────────────
  $('#composer').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = $('#msg-in');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    // Mostrar el mensaje del usuario siempre
    msg(text, 'user');

    // Si estamos en flujo de recolección, interceptar
    if (collect.active) {
      await handleCollectStep(text);
      return;
    }

    // Chat normal con el agente
    st.messages.push({ role:'user', content:text });
    const typing = msg('', 'typing');
    $('#send-btn').disabled = true;
    try {
      const d = await api({ action:'chat', messages: st.messages.slice(-10), cart: st.cart });
      typing.remove();
      msg(d.message);
      st.messages.push({ role:'assistant', content:d.message });
      if (d.cart) st.cart = d.cart;
      renderCartBar();
    } catch(err) {
      typing.remove();
      msg(err.message, 'sys');
    } finally {
      $('#send-btn').disabled = false;
      input.focus();
    }
  });

  // ── URL param ─────────────────────────────────────────────────────────────
  const urlSlug = new URLSearchParams(location.search).get('org');
  if (urlSlug) initBiz(urlSlug);
</script>
</body>
</html>
