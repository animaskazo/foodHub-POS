<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodHub · Food Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0b0f;
      --bg2:     #111318;
      --bg3:     #1a1d26;
      --border:  rgba(255,255,255,0.07);
      --text:    #f0f1f5;
      --muted:   #6b7280;
      --accent:  #f97316;
      --accent2: #fb923c;
      --green:   #22c55e;
      --red:     #ef4444;
      --r:       14px;
      --rsm:     9px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── SELECTOR ── */
    #selector {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 2rem;
      background:
        radial-gradient(ellipse 80% 55% at 50% -5%, rgba(249,115,22,.13) 0%, transparent 65%),
        var(--bg);
      transition: opacity .35s, transform .35s;
    }
    #selector.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

    .s-logo {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 6px rgba(249,115,22,.4)); }
      50%      { filter: drop-shadow(0 0 18px rgba(249,115,22,.8)); }
    }
    .s-card {
      width: 100%; max-width: 440px;
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 22px; padding: 2.25rem;
      backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .s-card h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: .25rem; }
    .s-card > p { color: var(--muted); font-size: .875rem; margin-bottom: 1.75rem; }
    .cap { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; display: block; }
    .preset {
      display: flex; align-items: center; gap: .7rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); padding: .75rem .9rem;
      cursor: pointer; color: var(--text); font-family: inherit; font-size: .875rem;
      width: 100%; text-align: left; transition: background .2s, border-color .2s, transform .15s;
    }
    .preset:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.14); transform: translateX(3px); }
    .p-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .p-info b { display: block; font-weight: 600; font-size: .875rem; }
    .p-info small { color: var(--muted); font-size: .74rem; }
    .p-badge { margin-left: auto; font-size: .68rem; font-weight: 600; background: rgba(34,197,94,.12); color: var(--green); padding: .18rem .5rem; border-radius: 99px; border: 1px solid rgba(34,197,94,.2); }
    .s-sep { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--muted); font-size: .74rem; }
    .s-sep::before, .s-sep::after { content:''; flex:1; height:1px; background: var(--border); }
    .s-row { display: flex; gap: .5rem; }
    .s-row input { flex:1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rsm); padding: .65rem .9rem; color: var(--text); font-size: .875rem; font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s; }
    .s-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
    .s-row button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: var(--rsm); padding: .65rem 1rem; font-weight: 600; font-size: .875rem; cursor: pointer; font-family: inherit; transition: opacity .2s; white-space: nowrap; }
    .s-row button:hover { opacity: .9; }
    .s-err { margin-top: .85rem; font-size: .78rem; color: var(--red); display: none; }
    .s-err.on { display: block; }

    /* ── APP ── */
    #app { display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: opacity .35s .1s; }
    #app.on { opacity: 1; }

    /* ── HEADER ── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.25rem; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0; gap: 1rem;
    }
    .h-left { display: flex; align-items: center; gap: .7rem; min-width: 0; }
    .h-logo { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
    .h-biz { min-width: 0; }
    .h-biz-name { font-weight: 700; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-biz-status { display: flex; align-items: center; gap: .3rem; font-size: .72rem; color: var(--muted); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
    .sdot.off { background: var(--muted); animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Cart pill — solo informativo */
    #cart-pill {
      display: none; align-items: center; gap: .5rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 99px; padding: .35rem .85rem;
      font-size: .78rem; white-space: nowrap; flex-shrink: 0;
    }
    #cart-pill.on { display: flex; animation: fadein .2s ease-out; }
    @keyframes fadein { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    #cart-pill .pill-count { font-weight: 700; color: var(--accent); }
    #cart-pill .pill-total { color: var(--muted); }
    #cart-pill .pill-sep { color: var(--border); }

    .h-right { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
    .hbtn { background: none; border: 1px solid var(--border); border-radius: var(--rsm); padding: .35rem .75rem; color: var(--muted); font-size: .74rem; cursor: pointer; font-family: inherit; transition: all .2s; white-space: nowrap; }
    .hbtn:hover { border-color: rgba(255,255,255,.14); color: var(--text); }
    .dev-tag { font-size: .65rem; font-weight: 600; letter-spacing: .06em; background: rgba(249,115,22,.1); color: var(--accent); border: 1px solid rgba(249,115,22,.2); border-radius: 99px; padding: .2rem .6rem; }

    /* ── COLLECT STATUS BAR ── */
    #collect-bar {
      display: none; align-items: center; gap: .6rem;
      padding: .55rem 1.25rem; border-bottom: 1px solid var(--border);
      background: rgba(249,115,22,.06); font-size: .78rem; flex-shrink: 0;
    }
    #collect-bar.on { display: flex; }
    .cb-step-icon { font-size: .9rem; }
    .cb-hint { flex: 1; color: var(--muted); }
    .cb-hint b { color: var(--text); }
    .cb-cancel-btn { background: none; border: none; color: var(--muted); font-size: .74rem; cursor: pointer; font-family: inherit; transition: color .2s; }
    .cb-cancel-btn:hover { color: var(--red); }

    /* ── MESSAGES ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 1.1rem 1.25rem;
      display: flex; flex-direction: column; gap: .6rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg {
      max-width: 72%; border-radius: var(--r);
      padding: .65rem .95rem; font-size: .875rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      animation: min .22s ease-out;
    }
    @keyframes min { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg.agent { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user  { align-self: flex-end; background: linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; border-bottom-right-radius: 4px; }
    .msg.sys   { align-self: center; background: rgba(107,114,128,.1); color: var(--muted); font-size: .74rem; border-radius: 99px; padding: .3rem .85rem; max-width: 90%; white-space: normal; }
    .msg.typing { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; padding: .65rem .95rem; }
    .dots { display:flex; gap:4px; align-items:center; }
    .dots span { width:6px; height:6px; border-radius:50%; background: var(--muted); animation: dp 1.2s ease-in-out infinite; }
    .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
    @keyframes dp { 0%,80%,100%{transform:scale(1);opacity:.5} 40%{transform:scale(1.3);opacity:1} }

    /* ── COMPOSER ── */
    .composer {
      padding: .85rem 1.25rem; border-top: 1px solid var(--border);
      display: flex; gap: .65rem; background: var(--bg2); flex-shrink: 0;
      align-items: center;
    }
    .composer input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 99px; padding: .65rem 1.1rem;
      color: var(--text); font-size: .875rem; font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .composer input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,.1); }
    .composer input.collecting { border-color: rgba(249,115,22,.4); }
    .composer button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#fff; border:none; border-radius:99px;
      padding: .65rem 1.3rem; font-weight:600; cursor:pointer;
      font-family:inherit; font-size:.875rem; flex-shrink:0;
      transition: opacity .2s, transform .15s;
    }
    .composer button:hover { opacity:.9; transform:translateY(-1px); }
    .composer button:disabled { opacity:.35; transform:none; cursor:default; }

    /* ── LOADER ── */
    #loader { position:fixed; inset:0; background:rgba(10,11,15,.85); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(4px); transition:opacity .3s; }
    #loader.hidden { opacity:0; pointer-events:none; }
    .spin { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="loader" class="hidden"><div class="spin"></div></div>

<!-- SELECTOR -->
<div id="selector">
  <div class="s-logo">✦</div>
  <div class="s-card">
    <h1>Food Agent · Tester</h1>
    <p>Selecciona un negocio para iniciar la conversación.</p>
    <span class="cap">Negocios disponibles</span>
    <div style="display:flex;flex-direction:column;gap:.45rem">
      <button class="preset" data-slug="pizza-nostra">
        <div class="p-icon" style="background:rgba(239,68,68,.12)">🍕</div>
        <div class="p-info"><b>Pizza Nostra</b><small>pizza-nostra</small></div>
        <span class="p-badge">Online</span>
      </button>
    </div>
    <div class="s-sep">o ingresa un slug</div>
    <div class="s-row">
      <input id="slug-in" type="text" placeholder="mi-restaurante" spellcheck="false" autocomplete="off" />
      <button id="slug-go">Probar →</button>
    </div>
    <p class="s-err" id="s-err"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="h-left">
      <div class="h-logo">✦</div>
      <div class="h-biz">
        <div class="h-biz-name" id="biz-name">—</div>
        <div class="h-biz-status">
          <span class="sdot" id="sdot"></span>
          <span id="biz-status">Verificando…</span>
        </div>
      </div>
    </div>

    <!-- cart pill — solo muestra info, no es un botón de acción -->
    <div id="cart-pill">
      <span class="pill-count" id="pill-count">0</span>
      <span class="pill-sep">·</span>
      <span class="pill-total" id="pill-total">$0</span>
    </div>

    <div class="h-right">
      <span class="dev-tag">DEV</span>
      <button class="hbtn" id="back-btn">← Negocios</button>
    </div>
  </header>

  <!-- barra de estado del flujo de recolección -->
  <div id="collect-bar">
    <span class="cb-step-icon" id="cb-icon">📝</span>
    <span class="cb-hint" id="cb-hint">Escribe tu respuesta arriba</span>
    <button class="cb-cancel-btn" id="cb-cancel">✕ cancelar</button>
  </div>

  <div id="messages"></div>

  <form class="composer" id="composer">
    <input id="msg-in" autocomplete="off" placeholder="Escribe tu pedido…" required />
    <button id="send-btn" type="submit">Enviar</button>
  </form>
</div>

<script>
  const FN = 'https://fgvhbniauzjvzeuespmf.supabase.co/functions/v1/food-agent';
  const st = { messages: [], cart: [], org: null, slug: null };
  // Máquina de estados para recolección conversacional
  const col = { active: false, step: null, data: {} };
  // steps: 'name' → 'phone' → 'notes' → (llama confirm)

  const $ = s => document.querySelector(s);
  const esc = v => String(v).replace(/[&<>'"]/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' })[c]);

  function money(n) {
    return new Intl.NumberFormat('es-CL', {
      style: 'currency', currency: st.org?.currency || 'CLP', maximumFractionDigits: 0
    }).format(n || 0);
  }

  async function api(body) {
    const r = await fetch(FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ organization_slug: st.slug, ...body })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || 'Error de conexión.');
    return d;
  }

  // ── Mensajes ──────────────────────────────────────────────────────────────
  function msg(text, role = 'agent') {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    if (role === 'typing') {
      el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    } else {
      el.textContent = text;
    }
    $('#messages').append(el);
    $('#messages').scrollTop = $('#messages').scrollHeight;
    return el;
  }

  // ── Cart pill ─────────────────────────────────────────────────────────────
  function renderCart() {
    if (!st.cart.length) { $('#cart-pill').classList.remove('on'); return; }
    const count = st.cart.reduce((t, i) => t + i.quantity, 0);
    const total = st.cart.reduce((s, i) => s + i.unit_price * i.quantity, 0);
    $('#pill-count').textContent = `${count} producto${count !== 1 ? 's' : ''}`;
    $('#pill-total').textContent = money(total);
    $('#cart-pill').classList.add('on');
  }

  // ── Collect bar ───────────────────────────────────────────────────────────
  const STEPS = {
    details: { icon: '📝', hint: 'Escribe tu <b>nombre</b> y tu <b>teléfono</b>' },
  };
  const PLACEHOLDERS = {
    details: 'Ej: Juan, +56912345678', idle: 'Escribe tu pedido…'
  };

  function updateCollectBar() {
    const bar = $('#collect-bar');
    const input = $('#msg-in');
    if (!col.active) {
      bar.classList.remove('on');
      input.classList.remove('collecting');
      input.placeholder = PLACEHOLDERS.idle;
      return;
    }
    bar.classList.add('on');
    input.classList.add('collecting');
    input.placeholder = PLACEHOLDERS[col.step] || PLACEHOLDERS.idle;
    const s = STEPS[col.step] || {};
    $('#cb-icon').textContent = s.icon || '📝';
    $('#cb-hint').innerHTML = s.hint || '';
  }

  // ── Inicio del flujo conversacional de confirmación ───────────────────────
  function startCollect() {
    if (col.active) return;
    col.active = true; col.step = 'details'; col.data = {};
    updateCollectBar();
    msg('¡Perfecto! Para confirmar tu pedido necesito tu nombre y teléfono.\n\nEscríbelos así: "Juan, +56912345678"');
    $('#msg-in').focus();
  }

  function cancelCollect() {
    col.active = false; col.step = null; col.data = {};
    updateCollectBar();
    msg('Confirmación cancelada. Tu carrito sigue guardado.', 'sys');
    $('#msg-in').focus();
  }

  async function handleCollectStep(text) {
    if (/^cancelar$/i.test(text.trim())) { cancelCollect(); return; }

    if (col.step === 'details') {
      const parts = text.split(',');
      const name = parts[0].trim();
      const phone = parts.length > 1 ? parts.slice(1).join(',').trim() : 'No provisto';

      col.data.name = name;
      col.data.phone = phone;
      col.data.notes = '';
      col.step = null;
      const cartSnapshot = [...st.cart];

      updateCollectBar(); // quitar bar mientras procesa
      const typing = msg('', 'typing');
      $('#send-btn').disabled = true;

      try {
        const data = await api({
          action: 'confirm', channel: 'web',
          cart: cartSnapshot,
          customer: { name: col.data.name, phone: col.data.phone, notes: col.data.notes }
        });

        typing.remove();
        col.active = false; col.data = {};
        updateCollectBar();
        st.cart = []; st.messages = [];
        renderCart();

        // ── Confirmación como mensaje de texto (compatible con WhatsApp) ──
        const itemLines = cartSnapshot
          .map(i => `• ${i.quantity} × ${i.name} — ${money(i.unit_price * i.quantity)}`)
          .join('\n');
        const total = cartSnapshot.reduce((s, i) => s + i.unit_price * i.quantity, 0);

        msg(
          `✅ *Pedido confirmado*\n` +
          `Número: ${data.order_number}\n\n` +
          `${itemLines}\n\n` +
          `Total: ${money(data.total ?? total)}\n\n` +
          `El local te contactará pronto para coordinar la entrega 🙌`
        );

      } catch (err) {
        typing.remove();
        col.active = false; col.data = {};
        updateCollectBar();
        renderCart();
        msg('⚠ ' + err.message + '\nTu carrito sigue guardado, puedes intentar de nuevo.', 'sys');
      } finally {
        $('#send-btn').disabled = false;
        $('#msg-in').focus();
      }
    }
  }

  // ── Detectar intención de confirmar en el chat normal ─────────────────────
  const CONFIRM_RE = /\b(confirmar?|confirmo|quiero\s+confirmar|listo\s+para\s+pedir|finalizar\s+pedido|hacer\s+el\s+pedido|pagar|checkout)\b/i;

  // ── Chat normal ───────────────────────────────────────────────────────────
  async function sendChat(text) {
    st.messages.push({ role: 'user', content: text });
    const typing = msg('', 'typing');
    $('#send-btn').disabled = true;
    try {
      const d = await api({ action: 'chat', messages: st.messages.slice(-10), cart: st.cart });
      typing.remove();
      msg(d.message);
      st.messages.push({ role: 'assistant', content: d.message });
      if (d.cart) st.cart = d.cart;
      renderCart();
    } catch (err) {
      typing.remove();
      msg(err.message, 'sys');
    } finally {
      $('#send-btn').disabled = false;
      $('#msg-in').focus();
    }
  }

  // ── Init negocio ──────────────────────────────────────────────────────────
  async function initBiz(slug) {
    st.slug = slug; st.messages = []; st.cart = [];
    col.active = false; col.step = null; col.data = {};
    $('#messages').innerHTML = '';
    renderCart(); updateCollectBar();
    $('#loader').classList.remove('hidden');
    try {
      const d = await api({ action: 'welcome' });
      st.org = d.organization;
      $('#biz-name').textContent = d.organization.name;
      $('#biz-status').textContent = d.organization.online_enabled ? 'Pedidos abiertos' : 'Pedidos cerrados';
      $('#sdot').className = 'sdot' + (d.organization.online_enabled ? '' : ' off');
      $('#selector').classList.add('hidden');
      $('#app').classList.add('on');
      msg(d.message);
      if (!d.organization.online_enabled)
        msg('Esta sucursal no recibe pedidos en línea actualmente.', 'sys');
      $('#msg-in').focus();
    } catch (err) {
      $('#s-err').textContent = '⚠ ' + err.message;
      $('#s-err').classList.add('on');
      st.slug = null;
    } finally {
      $('#loader').classList.add('hidden');
    }
  }

  // ── Selector ──────────────────────────────────────────────────────────────
  document.querySelectorAll('.preset').forEach(b =>
    b.addEventListener('click', () => { $('#s-err').classList.remove('on'); initBiz(b.dataset.slug); })
  );
  $('#slug-go').addEventListener('click', () => {
    const s = $('#slug-in').value.trim().toLowerCase().replace(/\s+/g, '-');
    if (!s) return;
    $('#s-err').classList.remove('on'); initBiz(s);
  });
  $('#slug-in').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $('#slug-go').click(); }
  });

  // ── Header ────────────────────────────────────────────────────────────────
  $('#back-btn').addEventListener('click', () => {
    $('#app').classList.remove('on');
    $('#selector').classList.remove('hidden');
    $('#s-err').classList.remove('on');
    col.active = false; col.step = null; col.data = {};
  });

  // ── Collect bar cancel ────────────────────────────────────────────────────
  $('#cb-cancel').addEventListener('click', cancelCollect);

  // ── Composer ──────────────────────────────────────────────────────────────
  $('#composer').addEventListener('submit', async e => {
    e.preventDefault();
    const input = $('#msg-in');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    // Mostrar siempre el mensaje del usuario
    msg(text, 'user');

    // ¿Estamos en flujo de recolección?
    if (col.active) {
      await handleCollectStep(text);
      return;
    }

    // ¿El usuario quiere confirmar y hay carrito?
    if (CONFIRM_RE.test(text) && st.cart.length) {
      startCollect();
      return;
    }

    // ¿Quiere confirmar pero el carrito está vacío?
    if (CONFIRM_RE.test(text) && !st.cart.length) {
      msg('Aún no tienes productos en tu pedido. ¡Cuéntame qué quieres pedir! 😊');
      return;
    }

    // Chat normal con el agente
    await sendChat(text);
  });

  // ── URL param ─────────────────────────────────────────────────────────────
  const urlSlug = new URLSearchParams(location.search).get('org');
  if (urlSlug) initBiz(urlSlug);
</script>
</body>
</html>
